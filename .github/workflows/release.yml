name: Tag Release Pipeline

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve tag and validate version
        id: release
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [[ ! "$TAG" =~ ^v[0-9].* ]]; then
            echo "Invalid release tag: $TAG"
            exit 1
          fi

          VERSION="${TAG#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          echo "Detected tag: $TAG"
          echo "Detected version: $VERSION"
          echo "package.json version: $PACKAGE_VERSION"

          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "package.json version must match tag version."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  docker-build-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: prepare-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/orcaq:${{ needs.prepare-release.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/orcaq:latest
          labels: |
            org.opencontainers.image.version=${{ needs.prepare-release.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/orcaq:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/orcaq:buildcache,mode=max

      - name: Docker release summary
        run: echo "Docker image pushed: ${{ secrets.DOCKERHUB_USERNAME }}/orcaq:${{ needs.prepare-release.outputs.version }}"

  npx-package-build-publish:
    name: Build and publish NPX package
    runs-on: ubuntu-latest
    needs: prepare-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build NPX package bundle
        run: npm run npx:build

      - name: Verify generated package version
        shell: bash
        run: |
          NPX_VERSION="$(node -p "require('./npx-package/package.json').version")"
          echo "npx-package version: $NPX_VERSION"

          if [ "$NPX_VERSION" != "${{ needs.prepare-release.outputs.version }}" ]; then
            echo "npx-package version does not match release version."
            exit 1
          fi

      - name: Publish to npm
        working-directory: npx-package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: NPM release summary
        run: echo "Published npm package orcaq@${{ needs.prepare-release.outputs.version }}"
