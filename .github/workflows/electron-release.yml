name: Electron Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-electron:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      NODE_OPTIONS: --max-old-space-size=16384

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-22.04]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.8

      - name: Install frontend dependencies
        run: bun install

      - name: Pre-build (Nuxt generate + Nitro binary + compile TS)
        run: node scripts/electron-before-build.mjs

      - name: Validate macOS signing and notarization secrets
        if: matrix.os == 'macos-latest'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          for var in CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required macOS release secret: $var"
              exit 1
            fi
          done

      - name: Prepare notarization API key
        if: matrix.os == 'macos-latest'
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY" > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"
          echo "APPLE_API_KEY=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build Electron packages
        run: npx electron-builder --publish always
        env:
          # Required for electron-updater to publish to GitHub Releases
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-notarize*
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Recommended by electron-builder for macOS notarization on CI
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # Optional: Windows code signing
          # WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Verify macOS app signature
        if: matrix.os == 'macos-latest'
        run: |
          found_app=false
          while IFS= read -r -d '' app_path; do
            found_app=true
            echo "Verifying $app_path"
            codesign --verify --deep --strict --verbose=2 "$app_path"
            codesign -d --verbose=4 -r- "$app_path"
            spctl --assess --type execute --verbose=4 "$app_path"
            xcrun stapler validate "$app_path"
          done < <(find out/packages -type d -name 'orcaq.app' -print0)

          if [ "$found_app" = false ]; then
            echo "::error::No packaged macOS app found under out/packages"
            exit 1
          fi
