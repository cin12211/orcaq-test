# =============================================================================
# OrcaQ — Docker Compose
# The open-source next-generation database editor
# =============================================================================
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d orcaq        # Start OrcaQ only (bring your own DB)
#   docker compose logs -f orcaq      # Follow OrcaQ logs
#   docker compose down -v            # Stop & remove volumes
#
# OrcaQ is STATELESS — it connects to user-provided databases at runtime.
# The included PostgreSQL service is a DEMO database for testing, not required.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # OrcaQ Application (Nuxt 3 SPA + H3/Nitro backend)
  # ---------------------------------------------------------------------------
  orcaq:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orcaq
    restart: unless-stopped
    ports:
      - '${ORCAQ_PORT:-9432}:9432'
    environment:
      - NODE_ENV=production
      - NITRO_HOST=0.0.0.0
      - NITRO_PORT=9432
      # --- Analytics (optional — uncomment to enable) ---
      # - NUXT_AMPLITUDE_API_KEY=${NUXT_AMPLITUDE_API_KEY:-}
    networks:
      - orcaq-net
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:9432',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Demo PostgreSQL (for testing — remove if connecting to external DBs only)
  # ---------------------------------------------------------------------------
  # postgres-demo:
  #   image: postgres:16-alpine
  #   container_name: orcaq-postgres-demo
  #   restart: unless-stopped
  #   ports:
  #     - "${POSTGRES_PORT:-5432}:5432"
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-orcaq}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orcaq_demo_pass}
  #     POSTGRES_DB: ${POSTGRES_DB:-orcaq_demo}
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   networks:
  #     - orcaq-net
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orcaq} -d ${POSTGRES_DB:-orcaq_demo}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 10s

  # ---------------------------------------------------------------------------
  # (Optional) Nginx reverse proxy — uncomment to enable load balancing
  # ---------------------------------------------------------------------------
  # nginx:
  #   image: nginx:alpine
  #   container_name: orcaq-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     # - ./certs:/etc/nginx/certs:ro    # For HTTPS
  #   networks:
  #     - orcaq-net
  #   depends_on:
  #     - orcaq

volumes:
  pgdata:
    driver: local

networks:
  orcaq-net:
    driver: bridge
